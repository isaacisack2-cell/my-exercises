<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>keyboard zone</title>
    <style>
        body{
            height: 100vh;
            background: radial-gradient(circle at bottom left,gray,black);
            padding: 50px;
        }

        .margin{
            width: 500px;
            height: auto;
            border: 2px solid;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            perspective: 10000;
        }

        #keybd,#calc{
            width: 100%;
            height: 100%;
            margin-right: 20px;
            background-color: rgb(0, 0, 139);
            padding: 30px;
        }

        button{
            width: 40px;
            height: 30px;
            border-radius: 10px;
            animation: badilika 20s linear infinite;
            transition: all 1s ease;
        }@keyframes badilika{
            0%{background-color: aqua;scale: calc(1.15);}
            25%{background-color: blue;scale: calc(0.99);}
            50%{background-color: coral;scale: calc(1.2);}
            75%{background-color: yellow;scale: calc(0.85);}
            100%{background-color: green;scale: calc(1.0);}
        }

        input{
            height: 70px;
            font-size: 2rem;
            background: rgba(0, 0, 0, 0.452);
            color: darkturquoise;

        }

    </style>
</head>
<body>
    <div class="margin" id="margin">
        <div id="keybd" class="keybd">
        <input type="text" id="input" readonly>
        <div id="buttons"></div><span id="welcome"></span>
        </div>
        <div id="calc">
            <input type="text" readonly id="input_calc">
            <div id="buttons_calc"></div>
        </div>
    </div>

    <!--javascript codes-->
    <script>
        //declaring primary variables
        const body = document.body;
        const margin = document.getElementById('margin');
        const buttons = document.getElementById('buttons');
        const input = document.getElementById('input');
        const calc = document.getElementById('calc');
        const input_calc = document.getElementById('input_calc');
        const buttons_calc = document.getElementById('buttons_calc');
        const welcome = document.getElementById('welcome');

        //creating a keyboard
        const letters="abcdefghijklmnopqrstuvwxyz".split("");
        letters.forEach((herufi)=>{
           const btn=document.createElement('button');
           btn.innerText=herufi; 
           buttons.append(btn);
           btn.style.margin='5px';
           btn.addEventListener('click',()=>{
            input.value+=herufi;
           })
        })
        
        //creating del btn for keybd
        const del1 = document.createElement('button');
        del1.innerText="DEL";
        buttons.append(del1);
        del1.addEventListener('click',()=>{
            input.value=input.value.slice(0,-1);
        })

        //creating cls for my keybd
        const cls1 = document.createElement('button');
        cls1.innerText='CLS';
        buttons.append(cls1);
        cls1.addEventListener('click',()=>{
            input.value="";
            welcome.innerHTML="";
        })

        //creating submitting button for keybd
        const submit = document.createElement('button');
        submit.innerText='OK';
        buttons.append(submit);
        submit.addEventListener('click',()=>{
        welcome.innerHTML=`🎉congraturation \n welcome ${input.value} into our community created by sir isaac`;
            welcome.style.color="green";
        })



        //creating a calculator
        const numbers="0123456789+-*/".split("");
        numbers.forEach((namba)=>{
            const btn=document.createElement('button');
            btn.innerText=namba;
            buttons_calc.append(btn);
            btn.style.margin='10px';
            btn.addEventListener('click',()=>{
                input_calc.value+=namba;
            })
        })

        //creating button for calculating ans
        const ans=document.createElement('button');
        ans.innerText='ANS'
        buttons_calc.append(ans)
        ans.addEventListener('click',()=>{
            input_calc.value=eval(input_calc.value);
        })

        //creating del button
        const del = document.createElement('button')
        del.innerText='DEL';
        buttons_calc.append(del);
        del.addEventListener('click',()=>{
            input_calc.value=input_calc.value.slice(0,-1);
        })

        //creating a cls button
        const cls = document.createElement('button');
        cls.innerText='CLS';
        buttons_calc.append(cls)
        cls.addEventListener('click',()=>{
            input_calc.value="";
        })

    </script>
</body>
</html>
