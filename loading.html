<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: black;
            color:bisque;
        }
        .container{
            display: flex;
            position: relative;
            top: 200px;
            left: 50%;
            width: 200px;
            height: 200px;
            border-radius: 50%;
           /* border-top: 20px solid aqua yellow;*/
            border-right: 15px solid blue;
            border-bottom: 8px solid transparent;
            border-left: 15px solid red;
            animation: spin .92s linear infinite;
        }
        @keyframes spin {
            0%{transform: rotate(0deg); /*-webkit-box-reflect: below 100px;*/ box-shadow: 400px 350px 100px red;}
            100%{transform: rotate(360deg); box-shadow: 400px 350px 100px blue;/*-webkit-box-reflect: below 100px;*/}
        }
        p{
            position: sticky;
            top: 20px;
            left: 50%;
            font-size: 40px;animation: spin 0.92s linear infinite reverse;
        }
    </style>
</head>
<body>
    <div class="container"><p>ISAAC-ISACK</p>
    </div>
</body>
</html>
