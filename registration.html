<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>card-flip</title>
    <style>

        body{
              display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color:blue;
            margin: 0;
        }

        .card-container{
            perspective: 1000px;
            width: 300px;
            height: 400px;
            background-color: aquamarine;
            padding: 40px;
        }

        .card{
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 1s;
            transform-style: preserve-3d;
        }

        .card.flipped{
            transform: rotateY(180deg);
        }

        .card-front, .card-back{
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            background: white;
            box-shadow: 0 4px 8px black;
        }

        .card-back{
            transform: rotateY(180deg);
            background: #f0f0f0;
        }

        .rangi{
            background: radial-gradient(circle,gray,black);
        }

         .eye {
            width: 100px;
            height: 50px;
            background-color: white;
            border: 5px solid black;
            border-radius: 50px;
            position: relative;
            margin: 0 25px;
        }
        .pupil {
            width: 20px;
            height: 20px;
            background-color: black;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-100%, -100%);
            transition: transform 0.1s;
        }

       
    </style>
</head>
<body>
    <div class="card-container">
        <div class="card" id="mycard">
            <div class="card-front">
                <h2>log in</h2>
                <input type="text" placeholder="user name">
                <br><br>
                <input type="password" placeholder="password">
                <br><br>
                <button>login</button><button onclick="flipcard()">sign in</button>
            </div>
            <div class="card-back">
                <h2>SIGN IN </h2>
                <input type="text" placeholder="FULL NAME">
                <br><br>
                <input type="email" placeholder="email">
                <br><br>
                <input type="password" placeholder="password">
                <br><br>
                <button>sign in</button>
                <p>already have an account <button onclick="flipcard()">log in</button></p>
            </div>
        </div>
    </div>
    
    <div class="eye">
        <div class="pupil" id="pupil1"></div>
    </div>
    <div class="eye">
        <div class="pupil" id="pupil2"></div>
    </div>
    

    <script>
        function flipcard(){
            const card = document.getElementById('mycard');
            card.classList.toggle('flipped');
            const form = document.querySelector('div');
            form.classList.toggle('rangi')
        }

         const pupils = document.querySelectorAll('.pupil');

        document.addEventListener('mousemove', (event) => {
            const { clientX, clientY } = event;
            const eyeRect1 = pupils[0].parentElement.getBoundingClientRect();
            const eyeRect2 = pupils[1].parentElement.getBoundingClientRect();

            const eyeCenterX1 = eyeRect1.left + eyeRect1.width / 2;
            const eyeCenterY1 = eyeRect1.top + eyeRect1.height / 2;

            const eyeCenterX2 = eyeRect2.left + eyeRect2.width / 2;
            const eyeCenterY2 = eyeRect2.top + eyeRect2.height / 2;

            const angle1 = Math.atan2(clientY - eyeCenterY1, clientX - eyeCenterX1);
            const angle2 = Math.atan2(clientY - eyeCenterY2, clientX - eyeCenterX2);

            const pupil1X = Math.cos(angle1) * 15; // 15 ni kiwango cha mwendo wa pupili
            const pupil1Y = Math.sin(angle1) * 15;

            const pupil2X = Math.cos(angle2) * 15;
            const pupil2Y = Math.sin(angle2) * 15;

            pupils[0].style.transform = `translate(${pupil1X}px, ${pupil1Y}px)`;
            pupils[1].style.transform = `translate(${pupil2X}px, ${pupil2Y}px)`;
        });
    </script>
</body>
</html>
