<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
        }

        .box{
            position: relative;
            width: 300px;
            height: 300px;
            transform-style: preserve-3d;
            animation: anime 30s infinite linear;
        }

        @keyframes anime {
            0%{transform: rotatex(0deg) rotateY(0deg);}
            100%{transform: rotatex(40deg) rotateY(360deg);}
        }

       .box span{
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform-origin: center;
            transform-style: preserve-3d;
            -webkit-box-reflect: below 0px
            linear-gradient(transparent,transparent,#0004);
            /*  transform: rotateY(calc(var(--1)*45deg)) translateZ(400px);*/
            
        }

      .box span  img{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            width: 300px;
            border: 2px solid white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.548);
            border-radius: 18px;
            height: 100%;
            object-fit: cover;
          
        }
        
        .box span:nth-child(1){transform: rotateY(30deg) translateZ( 600px);}
        .box span:nth-child(2){transform: rotateY(60deg) translateZ( 700px);}
        .box span:nth-child(3){transform: rotateY(90deg) translateZ( 800px);}
        .box span:nth-child(4){transform: rotateY(120deg) translateZ( 900px);}
        .box span:nth-child(5){transform: rotateY(150deg) translateZ( 1000px);}
       .box span:nth-child(6){transform: rotateY(180deg) translateZ( 1200px);}
        .box span:nth-child(7){transform: rotateY(210deg) translateZ( 1100px);}
        .box span:nth-child(8){transform: rotateY(240deg) translateZ( 1000px);}
        .box span:nth-child(9){transform: rotateY(270deg) translateZ( 900px);}
        .box span:nth-child(10){transform: rotateY(300deg) translateZ( 800px);}
        .box span:nth-child(11){transform: rotateY(330deg) translateZ( 700px);}
        .box span:nth-child(12){transform: rotateY(360deg) translateZ( 600px);}
    </style>
</head>
<body>
    <div class="box">
            <span><img src="here.jpg" alt=""></span>
            <span><img src="tiger on log.jpg" alt=""></span>
            <span><img src="tiger.jpg" alt=""></span>
            <span> <img src="lion .jpg" alt=""></span>
            <span> <img src="lion king.jpg" alt=""></span>
            <span> <img src="coast sun set.jpg" alt=""></span>
            <h1></h1>
            <span> <img src="chicken.jpg" alt=""></span>
            <span> <img src="dog.jpg" alt=""></span>
            <span> <img src="sun rise (2).jpg" alt=""></span>
            <span> <img src="man sun set.jpg" alt=""></span>
            <span> <img src="ninja.jpg" alt=""></span>
            <span><img src="soldier warrior.jpg" alt=""> </span> 
    </div>
</body>
</html>
